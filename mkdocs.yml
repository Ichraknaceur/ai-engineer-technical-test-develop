site_name: Quarry Extraction Pipeline
site_description: Technical documentation for the quarry discovery and enrichment pipeline
site_author: AI Engineer Technical Test
site_url: ""

repo_name: quarry-extraction-pipeline
docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: brown
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: brown
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Technical Spec: technical-spec.md
  - API Reference: api.md
  - Pipeline: pipeline.md
  - Testing: testing.md
  - Deployment: deployment.md
