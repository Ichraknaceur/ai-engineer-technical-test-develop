services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quarry
      POSTGRES_PASSWORD: quarry
      POSTGRES_DB: quarry
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quarry"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    command: uvicorn backend.infrastructure.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://quarry:quarry@postgres:5432/quarry
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - venv:/app/.venv

  worker:
    build: .
    entrypoint: []
    command: ["celery", "-A", "backend.infrastructure.worker.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://quarry:quarry@postgres:5432/quarry
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - venv:/app/.venv

volumes:
  postgres_data:
  venv:
